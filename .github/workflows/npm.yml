name: npm

on:
  push:
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - run: npm ci
      - run: npm run build
      - run: npm pack
      - uses: actions/upload-artifact@v7
        with:
          name: feathersui-openfl-npm
          path: feathersui-openfl-*.tgz
          archive: false
          if-no-files-found: error
